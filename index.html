<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FOLD v9</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:monospace;user-select:none}
#c{display:block;position:fixed;top:0;left:0}
#info{position:fixed;top:16px;left:16px;font-size:11px;color:#555;line-height:2.4}
#info b{color:#7fffb2}
#badge{position:fixed;top:16px;right:16px;font-size:11px;padding:4px 14px;border-radius:99px;border:.5px solid #ff7f50;color:#ff7f50;letter-spacing:.1em}
#msg{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);font-size:12px;color:#7fffb2;letter-spacing:.08em;text-align:center;line-height:2;pointer-events:none}
#pui{position:fixed;top:0;left:0;width:100%;height:100%;display:none;pointer-events:all;z-index:100}
#pbg{position:absolute;inset:0;background:rgba(0,0,0,.75)}
#fc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);cursor:crosshair;border:.5px solid rgba(127,255,178,.25)}
#ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;z-index:101}
.btn{background:rgba(127,255,178,.08);border:.5px solid rgba(127,255,178,.4);color:#7fffb2;font-family:monospace;font-size:11px;padding:7px 18px;border-radius:4px;cursor:pointer;letter-spacing:.08em}
.btn:hover{background:rgba(127,255,178,.18)}
.btn.d{border-color:rgba(255,127,80,.4);color:#ff7f50;background:rgba(255,127,80,.06)}
#aslw{display:flex;align-items:center;gap:8px}
#asl{font-size:10px;color:#7fffb2}
#as{width:200px;accent-color:#7fffb2}
#ad{font-size:11px;color:#7fffb2;min-width:46px;text-align:right}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:rgba(127,255,178,.4);pointer-events:none;text-align:center;line-height:2;z-index:102}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,.95);border:.5px solid rgba(127,255,178,.3);padding:10px 22px;border-radius:6px;font-size:11px;color:#7fffb2;pointer-events:none;opacity:0;transition:opacity .25s;z-index:9999;text-align:center;white-space:pre-line}
#toast.s{opacity:1}#toast.e{color:#ff7f50;border-color:rgba(255,127,80,.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info"><b>WASD</b> 移動&nbsp;&nbsp;<b>右ドラッグ</b> 視点<br><b>SPACE</b> ジャンプ<br><b>TAB</b> 写真を撮って折る<br><b>Z</b> 一個戻す</div>
<div id="badge">MOVE</div>
<div id="msg">TABキーで今の視点を撮影 → 折り線を引いて角度調整 → 3Dに折る</div>
<div id="pui">
  <div id="pbg"></div>
  <canvas id="fc"></canvas>
  <div id="hint">ドラッグで折り線を引く</div>
  <div id="ctrl">
    <div id="aslw">
      <div id="asl">折り角度</div>
      <input type="range" id="as" min="-179" max="179" value="90" step="1">
      <div id="ad">90°</div>
    </div>
    <button class="btn" id="bplace">3Dに折る ↗</button>
    <button class="btn d" id="bcancel">キャンセル</button>
  </div>
</div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  FOLD v9 — Mesh-level cut & fold
//  折り線 → カーテン平面 → 各メッシュを頂点レベルで切断
//  折った側の頂点をRodrigues回転で変形
//  折り線を跨ぐポリゴンはその場でClipping
// ════════════════════════════════════════════════════════

// ── Renderer ─────────────────────────────────────────────
const mainC = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas:mainC, antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.localClippingEnabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a28);
scene.fog = new THREE.Fog(0x1a1a28, 35, 90);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 120);

// ── Lights ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.1));
const sun = new THREE.DirectionalLight(0xffffff, 2.0);
sun.position.set(10,18,8); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=sun.shadow.camera.bottom=-22;
sun.shadow.camera.right=sun.shadow.camera.top=22;
sun.shadow.camera.far=80;
sun.shadow.bias=-0.001;
scene.add(sun);
const hemi = new THREE.HemisphereLight(0xddeeff, 0x222233, 0.8);
scene.add(hemi);
const fillLight1=new THREE.PointLight(0x88aaff,0.9,55);
fillLight1.position.set(-6,7,6);
scene.add(fillLight1);
const fillLight2=new THREE.PointLight(0xffffff,0.8,45);
fillLight2.position.set(6,5,9);
scene.add(fillLight2);

// ── Material factory ──────────────────────────────────────
function mkMat(p){
  return new THREE.MeshStandardMaterial({
    color:      p.color      ?? 0xffffff,
    roughness:  p.roughness  ?? 0.8,
    metalness:  p.metalness  ?? 0,
    emissive:   p.emissive   ?? 0x000000,
    emissiveIntensity: p.emissiveIntensity ?? 0,
    side: THREE.DoubleSide,
  });
}

// ── Scene objects (ALL tracked for folding) ───────────────
// entry: { mesh, matP }
const TRACKED = [];

function addObj(geo, matP, x, y, z, rx=0, ry=0, rz=0){
  const mat = mkMat(matP);
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z);
  m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.receiveShadow=true;
  m.updateMatrixWorld(true);
  scene.add(m);
  TRACKED.push({mesh:m, matP:{...matP}});
  return m;
}

// Floor — subdivided so folds cut cleanly through the surface
// (a single low-poly box only has 8 verts at the corners; a fold line
//  through the middle of a face has nothing to grab, so it tears.
//  A 40x40 grid gives a fold line plenty of vertices to act on.)
function subdividedBox(w,h,d,segX,segY,segZ){
  return new THREE.BoxGeometry(w,h,d,segX,segY,segZ);
}
addObj(subdividedBox(28,.3,28,40,1,40), {color:0x1c1c2c,roughness:.9}, 0,-.15,0);
// Walls — also subdivided along their long axis
addObj(subdividedBox(28,7,.3,40,12,1), {color:0x15151f,roughness:1}, 0,3,-14);
addObj(subdividedBox(28,7,.3,40,12,1), {color:0x15151f,roughness:1}, 0,3, 14);
addObj(subdividedBox(.3,7,28,1,12,40), {color:0x15151f,roughness:1},-14,3,0);
addObj(subdividedBox(.3,7,28,1,12,40), {color:0x15151f,roughness:1}, 14,3,0);
// Platforms
addObj(new THREE.BoxGeometry(2.5,.25,2.5),{color:0x1e1e38,roughness:.85},-4,1.1,2);
addObj(new THREE.BoxGeometry(2.5,.25,2.5),{color:0x1e1e38,roughness:.85}, 3,2.0,-3);
addObj(new THREE.BoxGeometry(2.5,.25,2.5),{color:0x1e1e38,roughness:.85},-2,3.2,-5);
addObj(new THREE.BoxGeometry(2,.8,2),    {color:0x222240,roughness:.8}, 5,0.4, 4);
addObj(new THREE.BoxGeometry(1.5,3,1.5), {color:0x1a1a30,roughness:.9},-6,1.5,-3);
// Goal
addObj(new THREE.BoxGeometry(3,.3,3),
  {color:0xff7f50,roughness:.4,metalness:.1,emissive:0xff4400,emissiveIntensity:.5},
  5,5.5,-7);
const gpl=new THREE.PointLight(0xff7f50,1.8,10); gpl.position.set(5,6.5,-7); scene.add(gpl);

// ── Player ────────────────────────────────────────────────
const pmesh = new THREE.Mesh(
  new THREE.CylinderGeometry(.25,.25,1.4,10),
  new THREE.MeshStandardMaterial({color:0x7fffb2,emissive:0x7fffb2,emissiveIntensity:.2})
);
pmesh.castShadow=true; scene.add(pmesh);
const P={pos:new THREE.Vector3(0,1.7,8), vel:new THREE.Vector3(), yaw:Math.PI, pitch:-.15, onGround:false};

// ── Dynamic collision boxes ───────────────────────────────
// (collision is now computed live via raycasting against current
//  mesh geometry — see findGroundY — so no stale box list needed)

// ── Fold history (for undo) ───────────────────────────────
const foldHistory=[];

// ════════════════════════════════════════════════════════
//  Photo / Fold UI
// ════════════════════════════════════════════════════════
const pui      = document.getElementById('pui');
const fcanvas  = document.getElementById('fc');
const fc2      = fcanvas.getContext('2d');
const aslider  = document.getElementById('as');
const adisplay = document.getElementById('ad');
const hintEl   = document.getElementById('hint');
const toastEl  = document.getElementById('toast');

const FW = Math.min(innerWidth*.84, 1000);
const FH = Math.floor(FW * innerHeight/innerWidth);
fcanvas.width=FW; fcanvas.height=FH;
fcanvas.style.width=FW+'px'; fcanvas.style.height=FH+'px';

let photoImg=null, snapVP=null, snapCamPos=null;
let axA=null, axB=null, foldAngle=90, dragging=false;

let toastTimer=null;
function toast(msg,err=false,dur=3500){
  toastEl.textContent=msg;
  toastEl.className='s'+(err?' e':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.className='',dur);
}

function setBadge(t,c){
  const b=document.getElementById('badge');
  b.textContent=t; b.style.color=c; b.style.borderColor=c;
}

// ── Take screenshot & open fold UI ───────────────────────
function openPhotoMode(){
  renderer.render(scene, camera);
  camera.updateMatrixWorld(true);
  // Store VP matrix snapshot
  snapVP = new THREE.Matrix4()
    .multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
  snapCamPos = camera.position.clone();

  const img=new Image();
  img.onload=()=>{
    photoImg=img;
    fc2.clearRect(0,0,FW,FH);
    fc2.drawImage(img,0,0,FW,FH);
    axA=null; axB=null;
    hintEl.style.opacity='1';
    pui.style.display='block';
    setBadge('PHOTO','#b0a0ff');
    document.getElementById('msg').textContent='';
  };
  img.src=renderer.domElement.toDataURL('image/png');
}

function closePhotoMode(){
  pui.style.display='none';
  setBadge('MOVE','#ff7f50');
  document.getElementById('msg').textContent='TABキーで今の視点を撮影 → 折り線を引いて3Dに折る';
}

// ── Clip polygon helpers ──────────────────────────────────
function clipPoly(poly,ax,ay,bx,by,side){
  const dx=bx-ax,dy=by-ay,nx=-dy,ny=dx;
  function s(p){return (p.x-ax)*nx+(p.y-ay)*ny;}
  const out=[];
  for(let i=0;i<poly.length;i++){
    const a=poly[i],b2=poly[(i+1)%poly.length];
    const sa=s(a)*side,sb=s(b2)*side;
    if(sa>=0)out.push({...a});
    if((sa>=0&&sb<0)||(sa<0&&sb>=0)){
      const t=s(a)/(s(a)-s(b2));
      out.push({x:a.x+(b2.x-a.x)*t,y:a.y+(b2.y-a.y)*t});
    }
  }
  return out;
}
function rectPoly(){return [{x:0,y:0},{x:FW,y:0},{x:FW,y:FH},{x:0,y:FH}];}

// ── Draw 2D fold preview ──────────────────────────────────
function drawPreview(){
  fc2.clearRect(0,0,FW,FH);
  if(!photoImg){return;}
  if(!axA||!axB||Math.hypot(axB.x-axA.x,axB.y-axA.y)<4){
    fc2.drawImage(photoImg,0,0,FW,FH); return;
  }
  const {x:ax,y:ay}=axA,{x:bx,y:by}=axB;
  const cosA=Math.cos(foldAngle*Math.PI/180);
  const ang=Math.atan2(by-ay,bx-ax);
  const mx=(ax+bx)/2, my=(ay+by)/2;

  // Static half
  const pL=clipPoly(rectPoly(),ax,ay,bx,by,-1);
  if(pL.length>=3){
    fc2.save();
    fc2.beginPath(); fc2.moveTo(pL[0].x,pL[0].y);
    pL.forEach(p=>fc2.lineTo(p.x,p.y)); fc2.closePath(); fc2.clip();
    fc2.drawImage(photoImg,0,0,FW,FH);
    fc2.restore();
  }
  // Folded half — squish to simulate angle
  const pR=clipPoly(rectPoly(),ax,ay,bx,by,1);
  if(pR.length>=3){
    fc2.save();
    fc2.beginPath(); fc2.moveTo(pR[0].x,pR[0].y);
    pR.forEach(p=>fc2.lineTo(p.x,p.y)); fc2.closePath(); fc2.clip();
    fc2.translate(mx,my); fc2.rotate(ang);
    fc2.transform(1,0,0,cosA,0,0);
    fc2.rotate(-ang); fc2.translate(-mx,-my);
    fc2.globalAlpha=0.45+0.55*Math.abs(cosA);
    fc2.drawImage(photoImg,0,0,FW,FH);
    fc2.restore();
  }
  // Fold line
  fc2.save();
  const lc=foldAngle<0?'rgba(255,180,80,.9)':'rgba(127,255,178,.9)';
  fc2.strokeStyle=lc; fc2.lineWidth=1.5; fc2.setLineDash([5,4]);
  fc2.beginPath(); fc2.moveTo(ax,ay); fc2.lineTo(bx,by); fc2.stroke();
  fc2.setLineDash([]); fc2.fillStyle=lc; fc2.font='11px monospace';
  fc2.fillText(foldAngle+'°',mx+8,my-6);
  fc2.restore();
}

aslider.addEventListener('input',()=>{
  foldAngle=parseInt(aslider.value);
  adisplay.textContent=foldAngle+'°';
  if(axA&&axB) drawPreview();
});

fcanvas.addEventListener('mousedown',e=>{
  const r=fcanvas.getBoundingClientRect();
  axA={x:e.clientX-r.left,y:e.clientY-r.top};
  axB={...axA}; dragging=true; hintEl.style.opacity='0';
});
fcanvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const r=fcanvas.getBoundingClientRect();
  axB={x:e.clientX-r.left,y:e.clientY-r.top};
  drawPreview();
});
fcanvas.addEventListener('mouseup',()=>{dragging=false; if(axA&&axB)drawPreview();});
document.getElementById('bcancel').addEventListener('click',closePhotoMode);
document.getElementById('bplace').addEventListener('click',()=>{
  if(!axA||!axB||Math.hypot(axB.x-axA.x,axB.y-axA.y)<8){
    toast('先に折り線を引いてください',true); return;
  }
  performFold();
  closePhotoMode();
});

// ════════════════════════════════════════════════════════
//  CORE FOLD ENGINE
// ════════════════════════════════════════════════════════

// ── Unproject screen coords → world ray ──────────────────
function screenRay(sx, sy){
  const ndx=(sx/FW)*2-1, ndy=1-(sy/FH)*2;
  const invVP=snapVP.clone().invert();
  const near=new THREE.Vector4(ndx,ndy,-1,1).applyMatrix4(invVP);
  const far =new THREE.Vector4(ndx,ndy, 1,1).applyMatrix4(invVP);
  const n3=new THREE.Vector3(near.x/near.w,near.y/near.w,near.z/near.w);
  const f3=new THREE.Vector3(far.x/far.w,  far.y/far.w,  far.z/far.w);
  return {o:n3, d:f3.sub(n3).normalize()};
}

// ── World pos → screen UV (0..FW, 0..FH) ─────────────────
function worldToScreen(wp){
  const v=wp.clone().applyMatrix4(snapVP);
  return {
    sx: ( v.x*.5+.5)*FW,
    sy: (-v.y*.5+.5)*FH,
    vis: v.z>-1&&v.z<1, // in frustum depth
  };
}

// ── Sign relative to fold axis (screen space) ────────────
function axisSign2D(sx,sy){
  const dx=axB.x-axA.x, dy=axB.y-axA.y;
  return (sx-axA.x)*(-dy)+(sy-axA.y)*(dx);
}

// ── Rodrigues rotation ────────────────────────────────────
function rodrigues(v,k,rad){
  const c=Math.cos(rad),s=Math.sin(rad);
  const cr=new THREE.Vector3().crossVectors(k,v);
  const dt=k.dot(v);
  return new THREE.Vector3(
    v.x*c+cr.x*s+k.x*dt*(1-c),
    v.y*c+cr.y*s+k.y*dt*(1-c),
    v.z*c+cr.z*s+k.z*dt*(1-c),
  );
}

// ── Build curtain plane from fold axis screen line ────────
// The curtain plane passes through the camera and contains both rays through axA and axB
function buildCurtainPlane(){
  const rayA=screenRay(axA.x,axA.y);
  const rayB=screenRay(axB.x,axB.y);
  const n=rayA.d.clone().cross(rayB.d).normalize();
  const d=n.dot(snapCamPos);

  // "folded side" must match the side the user dragged toward
  // (screen-space right-of-axis = folded), not an arbitrary 3D guess.
  // Sample a point that's unambiguously screen-right of the axis line,
  // far enough out to land on real geometry (not just near the camera),
  // then check which sign of n·x-d it produces.
  const midSx=(axA.x+axB.x)/2, midSy=(axA.y+axB.y)/2;
  const axisDx=axB.x-axA.x, axisDy=axB.y-axA.y;
  const axisLen=Math.hypot(axisDx,axisDy)||1;
  // screen-space normal pointing right of the drag direction
  const screenNx=-axisDy/axisLen, screenNy=axisDx/axisLen;
  const sampleSx=midSx+screenNx*60, sampleSy=midSy+screenNy*60;

  const sampleRay=screenRay(sampleSx,sampleSy);
  const samplePt=snapCamPos.clone().addScaledVector(sampleRay.d,20);
  const sign=Math.sign(n.dot(samplePt)-d) || 1;

  // The 2D sign convention: axisSign2D(sampleSx,sampleSy) tells us
  // which numeric sign corresponds to "right of the drag" in screen
  // space. Store it so classifyAndFold can compare individual
  // projected vertices against the SAME convention.
  const screenFoldSign = Math.sign(axisSign2D(sampleSx,sampleSy)) || 1;

  return {n, d, foldedSign:sign, screenFoldSign};
}

// ── Which side of the curtain is the PLAYER standing on? ──
// The player's own ground must never be the side that gets folded —
// only the side the player is NOT standing on (i.e. "ahead of" them,
// away from the camera/player) should rotate.
function playerIsOnFoldedSide(curtain){
  const side=Math.sign(curtain.n.dot(P.pos)-curtain.d);
  return side*curtain.foldedSign>0;
}

// ── Build world-space fold axis ───────────────────────────
// Projects axA and axB onto y=0 plane (best-fit ground)
function buildWorldAxis(){
  const rayA=screenRay(axA.x,axA.y);
  const rayB=screenRay(axB.x,axB.y);
  function hitY(ray,y){
    if(Math.abs(ray.d.y)<1e-6) return null;
    const t=(y-ray.o.y)/ray.d.y;
    if(t<0.01)return null;
    return ray.o.clone().addScaledVector(ray.d,t);
  }
  // Try y=0 first, then y=1 fallback
  let wA=hitY(rayA,0)||hitY(rayA,1)||snapCamPos.clone().addScaledVector(rayA.d,8);
  let wB=hitY(rayB,0)||hitY(rayB,1)||snapCamPos.clone().addScaledVector(rayB.d,8);
  const dir=wB.clone().sub(wA).normalize();
  const pivot=wA.clone().lerp(wB,.5);
  return {pivot, dir};
}

// ── Cheap pre-check: does this mesh need folding at all? ──
// Checks the CURRENT geometry (before any subdivision) — if not a
// single vertex is both (a) on the folded side of the 3D curtain
// and (b) visibly on the folded side of the photo, this mesh is
// completely outside the fold's effect and must be left untouched.
function meshHasFoldableVertex(mesh, curtain){
  const geo=mesh.geometry;
  const posAttr=geo.attributes.position;
  const mat=mesh.matrixWorld;
  for(let i=0;i<posAttr.count;i++){
    const wp=new THREE.Vector3(posAttr.getX(i),posAttr.getY(i),posAttr.getZ(i))
      .applyMatrix4(mat);
    const side3D = Math.sign(curtain.n.dot(wp)-curtain.d) * curtain.foldedSign;
    if(side3D<=0) continue;
    const sc=worldToScreen(wp);
    if(!sc.vis) continue;
    const sideVal = axisSign2D(sc.sx, sc.sy);
    if(Math.sign(sideVal) === curtain.screenFoldSign) return true;
  }
  return false;
}

// ── Cut triangles that straddle the curtain plane ─────────
// Without this, a triangle with 2 verts on one side and 1 on the
// other gets dragged into a degenerate shape when only some of its
// verts rotate. We insert new vertices exactly on the curtain plane
// so every triangle ends up fully on one side or the other.
function subdivideAtCurtain(mesh, curtain){
  const geo = mesh.geometry;
  const mat = mesh.matrixWorld;
  const invMat = mat.clone().invert();
  const posAttr = geo.attributes.position;
  const idx = geo.index;
  if(!idx) return; // non-indexed geometry not expected here

  const oldPos = [];
  for(let i=0;i<posAttr.count;i++){
    oldPos.push(new THREE.Vector3(posAttr.getX(i),posAttr.getY(i),posAttr.getZ(i)));
  }

  function sideOf(localV){
    const wp = localV.clone().applyMatrix4(mat);
    return curtain.n.dot(wp) - curtain.d;
  }

  const newPositions = oldPos.map(v=>v.clone());
  const newTris = [];
  const vertCache = new Map(); // "i1_i2" -> new vertex index

  function getCutVertex(i1,i2,s1,s2){
    const key = i1<i2 ? i1+'_'+i2 : i2+'_'+i1;
    if(vertCache.has(key)) return vertCache.get(key);
    const t = s1/(s1-s2);
    const v = oldPos[i1].clone().lerp(oldPos[i2], t);
    const newIdx = newPositions.length;
    newPositions.push(v);
    vertCache.set(key,newIdx);
    return newIdx;
  }

  for(let t=0;t<idx.count;t+=3){
    const i0=idx.getX(t), i1=idx.getX(t+1), i2=idx.getX(t+2);
    const s0=sideOf(oldPos[i0]), s1=sideOf(oldPos[i1]), s2=sideOf(oldPos[i2]);
    const pos0=s0>=0, pos1=s1>=0, pos2=s2>=0;

    if(pos0===pos1 && pos1===pos2){
      // entirely on one side — keep as-is
      newTris.push(i0,i1,i2);
      continue;
    }

    // straddles — figure out the lone vertex
    let lone, a, b, loneS, aS, bS;
    if(pos0!==pos1 && pos0!==pos2){ lone=i0;a=i1;b=i2; loneS=s0;aS=s1;bS=s2; }
    else if(pos1!==pos0 && pos1!==pos2){ lone=i1;a=i2;b=i0; loneS=s1;aS=s2;bS=s0; }
    else { lone=i2;a=i0;b=i1; loneS=s2;aS=s0;bS=s1; }

    const cutA = getCutVertex(lone,a,loneS,aS);
    const cutB = getCutVertex(lone,b,loneS,bS);

    // lone triangle (small piece)
    newTris.push(lone, cutA, cutB);
    // remaining quad (a, b, cutB, cutA) split into 2 triangles
    newTris.push(a, b, cutB);
    newTris.push(a, cutB, cutA);
  }

  // Rebuild geometry with new verts/indices
  const flatPos = new Float32Array(newPositions.length*3);
  newPositions.forEach((v,i)=>{ flatPos[i*3]=v.x; flatPos[i*3+1]=v.y; flatPos[i*3+2]=v.z; });

  const newGeo = new THREE.BufferGeometry();
  newGeo.setAttribute('position', new THREE.BufferAttribute(flatPos,3));
  newGeo.setIndex(newTris);
  newGeo.computeVertexNormals();

  mesh.geometry.dispose();
  mesh.geometry = newGeo;
}


// vertex in world space, on folded side → rotate around world axis
function foldVertex(wp, pivot, axisDir, rad, curtainN, curtainD){
  // project onto axis
  const fromPivot=wp.clone().sub(pivot);
  const along=axisDir.clone().multiplyScalar(fromPivot.dot(axisDir));
  const perp=fromPivot.clone().sub(along);
  const perpRot=rodrigues(perp, axisDir, rad);
  return pivot.clone().add(along).add(perpRot);
}

// ── Classify each vertex of a mesh ───────────────────────
// Returns Float32Array of new positions (same count, modified in-place if folded)
function classifyAndFold(mesh, curtain, worldAxis, rad){
  const geo=mesh.geometry;
  const posAttr=geo.attributes.position;
  const mat=mesh.matrixWorld;

  // Check if ANY vertex is on folded side AND visible in photo
  let anyFolded=false, anyStatic=false;

  const count=posAttr.count;
  const localPos=[]; // Vector3 in local space
  const worldPos=[]; // Vector3 in world space
  const sides=[];    // +1 = folded, -1 = static (combined 3D + 2D check)

  for(let i=0;i<count;i++){
    const lp=new THREE.Vector3(
      posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)
    );
    const wp=lp.clone().applyMatrix4(mat);
    localPos.push(lp);
    worldPos.push(wp);

    // 3D check: which side of the curtain plane is this vertex on
    const side3D = Math.sign(curtain.n.dot(wp)-curtain.d) * curtain.foldedSign;

    // 2D check: project to the photo and see which side of the
    // drawn fold line it actually lands on. A vertex can be on the
    // "folded" side of the 3D curtain yet be drawn on the opposite
    // side of the line in the photo (e.g. it's far off to the side,
    // or behind something) — only fold what's truly on the folded
    // side IN THE PHOTO ITSELF.
    const sc=worldToScreen(wp);
    let folded2D=false;
    if(sc.vis){
      const sideVal = axisSign2D(sc.sx, sc.sy);
      // axisSign2D > 0 is the side we dragged the line "into" —
      // must match the same screen-space convention used when the
      // axis was drawn (right-of-drag = folded), so reuse the same
      // sign source as foldedSign's sample point.
      folded2D = Math.sign(sideVal) === curtain.screenFoldSign;
    }

    const isFolded = sc.vis && side3D>0 && folded2D;
    sides.push(isFolded?1:-1);
    if(isFolded) anyFolded=true; else anyStatic=true;
  }

  // Check if at least one folded vertex is visible on screen
  let visibleFolded = anyFolded;

  if(!visibleFolded) return null; // nothing to fold on this mesh

  // Build new position array
  const newPos=new Float32Array(count*3);

  for(let i=0;i<count;i++){
    let wp=worldPos[i];
    if(sides[i]===1){
      wp=foldVertex(wp, worldAxis.pivot, worldAxis.dir, rad, curtain.n, curtain.d);
    }
    // Convert back to local space
    const invMat=mat.clone().invert();
    const newLocal=wp.clone().applyMatrix4(invMat);
    newPos[i*3]  =newLocal.x;
    newPos[i*3+1]=newLocal.y;
    newPos[i*3+2]=newLocal.z;
  }

  return {newPos, anyFolded, anyStatic, visibleFolded};
}

// ── Main fold function ────────────────────────────────────
function performFold(){
  if(!axA||!axB)return;

  const curtain  = buildCurtainPlane();
  const worldAxis= buildWorldAxis();
  const rad      = foldAngle*Math.PI/180;

  // SAFEGUARD: the ground the player is standing on must never be
  // the side that rotates. If our screen-space sign guess put the
  // player on the folded side, flip it — only the far side (away
  // from the player) should ever fold.
  if(playerIsOnFoldedSide(curtain)){
    curtain.foldedSign *= -1;
  }


  const undoList=[];
  let foldCount=0;

  for(const {mesh, matP} of TRACKED){
    mesh.updateMatrixWorld(true);

    // Cheap pre-check on the CURRENT (un-subdivided) geometry:
    // does any vertex of this mesh actually land on the folded
    // side of the photo? If not, skip entirely — don't subdivide,
    // don't touch its geometry at all. This is what keeps objects
    // outside the photo's folded region completely untouched.
    if(!meshHasFoldableVertex(mesh, curtain)) continue;

    // Cut any triangle that straddles the curtain so the fold
    // never has to bend a single triangle across two sides
    subdivideAtCurtain(mesh, curtain);
    mesh.updateMatrixWorld(true);

    const result=classifyAndFold(mesh, curtain, worldAxis, rad);
    if(!result||!result.visibleFolded) continue;

    // Save old geometry for undo
    const oldPos=mesh.geometry.attributes.position.array.slice();
    undoList.push({mesh, oldPos});

    // Apply new positions
    const posAttr=mesh.geometry.attributes.position;
    for(let i=0;i<posAttr.count;i++){
      posAttr.setXYZ(i,
        result.newPos[i*3],
        result.newPos[i*3+1],
        result.newPos[i*3+2]
      );
    }
    posAttr.needsUpdate=true;
    mesh.geometry.computeVertexNormals();
    mesh.geometry.computeBoundingBox();
    mesh.geometry.computeBoundingSphere(); // required for raycasting to early-out correctly
    mesh.updateMatrixWorld(true);

    foldCount++;
  }

  if(undoList.length>0){
    foldHistory.push(undoList);
    toast(`✓ ${foldCount}個のメッシュを折りました`);
  } else {
    toast('折る対象がカメラに写っていません\n視点を変えてもう一度撮影してください',true);
  }
}

// ── Undo ─────────────────────────────────────────────────
function undoFold(){
  if(foldHistory.length===0){toast('戻せる折りがありません',true);return;}
  const last=foldHistory.pop();
  for(const {mesh,oldPos} of last){
    const posAttr=mesh.geometry.attributes.position;
    for(let i=0;i<posAttr.count;i++){
      posAttr.setXYZ(i,oldPos[i*3],oldPos[i*3+1],oldPos[i*3+2]);
    }
    posAttr.needsUpdate=true;
    mesh.geometry.computeVertexNormals();
  }
  // (no stale collision list to clear — raycasting reads live geometry)
  toast('一つ戻しました');
}

// ════════════════════════════════════════════════════════
//  Input
// ════════════════════════════════════════════════════════
const keys={};
let rdown=false;
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Tab'){e.preventDefault();if(pui.style.display!=='block')openPhotoMode();}
  if(e.code==='Escape'&&pui.style.display==='block')closePhotoMode();
  if(e.code==='KeyZ')undoFold();
});
document.addEventListener('keyup',e=>keys[e.code]=false);
mainC.addEventListener('mousedown',e=>{if(e.button===2)rdown=true;});
mainC.addEventListener('mousemove',e=>{
  if(rdown){
    P.yaw-=e.movementX*.0022;
    P.pitch=Math.max(-1.2,Math.min(1.2,P.pitch-e.movementY*.0022));
  }
});
mainC.addEventListener('mouseup',e=>{if(e.button===2)rdown=false;});
mainC.addEventListener('contextmenu',e=>e.preventDefault());

// ════════════════════════════════════════════════════════
//  Player collision — raycast straight down into the ACTUAL
//  current mesh surfaces. This always matches what's rendered,
//  including folded/angled geometry, instead of relying on
//  fixed AABBs that go stale the moment a mesh is folded.
// ════════════════════════════════════════════════════════
const downRay = new THREE.Raycaster();
const COLLIDABLE_MESHES = TRACKED.map(t=>t.mesh); // updated in place as meshes fold

function findGroundY(x, z, fromY){
  downRay.set(new THREE.Vector3(x, fromY, z), new THREE.Vector3(0,-1,0));
  downRay.far = fromY + 2; // don't search infinitely below the world
  const hits = downRay.intersectObjects(COLLIDABLE_MESHES, false);
  if(hits.length === 0) return null;
  // Closest hit (Three sorts intersectObjects by distance already)
  return hits[0].point.y;
}

function tickPlayer(dt){
  if(pui.style.display==='block') return;
  const fwd  =new THREE.Vector3(-Math.sin(P.yaw),0,-Math.cos(P.yaw));
  const right=new THREE.Vector3( Math.cos(P.yaw),0,-Math.sin(P.yaw));
  const dir  =new THREE.Vector3();
  if(keys['KeyW'])dir.addScaledVector(fwd, 1);
  if(keys['KeyS'])dir.addScaledVector(fwd,-1);
  if(keys['KeyA'])dir.addScaledVector(right,-1);
  if(keys['KeyD'])dir.addScaledVector(right, 1);
  if(dir.length())dir.normalize();
  P.vel.x+=(dir.x*5.5-P.vel.x)*Math.min(dt*13,1);
  P.vel.z+=(dir.z*5.5-P.vel.z)*Math.min(dt*13,1);
  P.vel.y-=22*dt;
  P.pos.addScaledVector(P.vel,dt);

  // Raycast straight down from slightly above the player to find
  // the actual surface beneath them — always matches current
  // (possibly folded) geometry, never goes stale.
  const probeY = P.pos.y + 1.2;
  const groundY = findGroundY(P.pos.x, P.pos.z, probeY);

  P.onGround = false;
  if(groundY !== null){
    const standY = groundY + 1.05; // player eye height above feet
    // Only snap to it if we're at/below it and falling (or already resting)
    if(P.pos.y <= standY + 0.05 && P.vel.y <= 0.01){
      P.pos.y = standY;
      P.vel.y = 0;
      P.onGround = true;
    }
  }

  P.pos.y=Math.min(12,P.pos.y);
  P.pos.x=Math.max(-13,Math.min(13,P.pos.x));
  P.pos.z=Math.max(-13,Math.min(13,P.pos.z));
  if((keys['Space']||keys['ArrowUp'])&&P.onGround){P.vel.y=8.5;P.onGround=false;}

  pmesh.position.set(P.pos.x,P.pos.y-.85+.7,P.pos.z);
  camera.position.copy(P.pos);
  camera.rotation.order='YXZ';
  camera.rotation.y=P.yaw;
  camera.rotation.x=P.pitch;
}

// ════════════════════════════════════════════════════════
//  Goal check
// ════════════════════════════════════════════════════════
let won=false;
function checkGoal(){
  if(won)return;
  if(P.pos.distanceTo(new THREE.Vector3(5,6,-7))<2){
    won=true;
    toast('— GOAL —\n折って辿り着いた！');
  }
}

// ════════════════════════════════════════════════════════
//  Main loop
// ════════════════════════════════════════════════════════
const clock=new THREE.Clock();
(function loop(){
  requestAnimationFrame(loop);
  tickPlayer(Math.min(clock.getDelta(),.05));
  checkGoal();
  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
